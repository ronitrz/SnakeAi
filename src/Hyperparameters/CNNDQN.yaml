mode:
  training: false
  load_checkpoint: false
  model_path: "../models/cnn_dqn_10x10/cnn_dqn_10x10.pt"
  logging: false
  logs_dir: "../logs/cnn_dqn_10x10"

environment:
  board_size: 10
  action_dim: 4
  starvation_steps: 200

dqn:
  gamma: 0.99
  batch_size: 64
  epsilon_start: 1.0
  epsilon_min: 0.01
  epsilon_decay: 0.9997
  learning_rate: 0.0001
  target_update_frequency: 2000

network:
  conv_filters: [32, 64, 128]
  kernel_sizes: [3, 3, 3]
  fc_layers: [512, 512]
  dropout: 0.0

training:
  num_episodes: 22000
  save_best_only: false
  checkpoint_interval: 500

replay_memory:
  capacity: 200000